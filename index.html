<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>latexindent.pl in zeroperl</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 1400px; margin: 1em auto; padding: 0 1em; }
    h1 { margin-bottom: 0.2em; }
    .sub { color: #666; margin-top: 0; }
    .row { display: flex; gap: 1em; }
    .col { flex: 1; display: flex; flex-direction: column; }
    textarea { width: 100%; min-height: 380px; font-family: ui-monospace, monospace; font-size: 13px; box-sizing: border-box; }
    #stderr { height: 140px; background: #f7f7f7; border: 1px solid #ccc; padding: 0.5em; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; margin-top: 0.5em; }
    #status { padding: 0.4em 0.7em; background: #eef; border: 1px solid #ccd; border-radius: 4px; margin: 0.5em 0; font-size: 13px; }
    button { padding: 0.5em 1em; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>
<body>
  <h1>latexindent.pl in zeroperl</h1>
  <p class="sub">latexindent.pl 4.0.1 running entirely in your browser via WebAssembly (Perl 5.42 / WASI).</p>
  <div id="status">Loading…</div>
  <p><button id="run" disabled>Run latexindent</button></p>
  <div class="row">
    <div class="col">
      <h3>Input (LaTeX)</h3>
      <textarea id="input">\documentclass{article}
\begin{document}
\begin{itemize}
\item one
\begin{enumerate}
\item nested
\item another
\end{enumerate}
\item two
\end{itemize}
\end{document}
</textarea>
    </div>
    <div class="col">
      <h3>Output (indented)</h3>
      <textarea id="output" readonly></textarea>
    </div>
  </div>
  <h3>stderr / log</h3>
  <pre id="stderr"></pre>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
